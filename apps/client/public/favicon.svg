<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">

  <!-- Bande gauche perforations -->
  <rect x="2" y="4" width="7" height="24" rx="2" fill="#FF2056"/>
  <!-- Bande droite perforations -->
  <rect x="23" y="4" width="7" height="24" rx="2" fill="#FF2056"/>

  <!-- Perforations gauche (transparent) -->
  <rect x="3.5" y="6"  width="4" height="3" rx="1" fill="white" opacity="0.5"/>
  <rect x="3.5" y="11" width="4" height="3" rx="1" fill="white" opacity="0.5"/>
  <rect x="3.5" y="16" width="4" height="3" rx="1" fill="white" opacity="0.5"/>
  <rect x="3.5" y="21" width="4" height="3" rx="1" fill="white" opacity="0.5"/>

  <!-- Perforations droite (transparent) -->
  <rect x="24.5" y="6"  width="4" height="3" rx="1" fill="white" opacity="0.5"/>
  <rect x="24.5" y="11" width="4" height="3" rx="1" fill="white" opacity="0.5"/>
  <rect x="24.5" y="16" width="4" height="3" rx="1" fill="white" opacity="0.5"/>
  <rect x="24.5" y="21" width="4" height="3" rx="1" fill="white" opacity="0.5"/>

  <!-- Zone centrale : 3 frames -->
  <rect x="10" y="4"    width="12" height="7.5" rx="1" fill="#FF2056" opacity="0.15"/>
  <rect x="10" y="12.2" width="12" height="7.5" rx="1" fill="#FF2056" opacity="0.15"/>
  <rect x="10" y="20.5" width="12" height="7.5" rx="1" fill="#FF2056" opacity="0.15"/>

  <!-- Bordures frames -->
  <rect x="10" y="4"    width="12" height="7.5" rx="1" fill="none" stroke="#FF2056" stroke-width="0.8"/>
  <rect x="10" y="12.2" width="12" height="7.5" rx="1" fill="none" stroke="#FF2056" stroke-width="0.8"/>
  <rect x="10" y="20.5" width="12" height="7.5" rx="1" fill="none" stroke="#FF2056" stroke-width="0.8"/>

</svg>
